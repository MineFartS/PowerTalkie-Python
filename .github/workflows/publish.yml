name: Publish to PyPI
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: MineFartS/PyPi-Increment-Publish@v2